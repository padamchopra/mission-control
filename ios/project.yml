name: MissionControl
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
targets:
  MissionControl:
    type: application
    platform: iOS
    sources:
      - MissionControl
    # Signing values live in Config/Signing.local.xcconfig, which is ignored.
    # This tracked base file keeps public clones buildable with placeholder
    # settings while preserving each developer's identity across regeneration.
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    dependencies:
      - package: SwiftTerm
    info:
      path: MissionControl/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Mission Control
        NSAppTransportSecurity:
          # Plain HTTP is acceptable here: the server is only reachable inside
          # the WireGuard-encrypted tailnet. Tighten via `tailscale serve` TLS later.
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: Scan the pairing QR code shown by the setup script.
        CFBundleURLTypes:
          - CFBundleURLSchemes: [missioncontrol]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        SWIFT_VERSION: "5.0"
        # 1,2 (iPhone + iPad) is required for Mac Catalyst — the Mac app is the
        # iPad layout running natively on macOS, same codebase and target.
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
